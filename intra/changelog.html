<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — Intra — ux-library</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .cl-version-block { margin-bottom: 36px; }
    .cl-version-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .cl-version-num {
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      color: var(--surface); background: var(--teal);
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.03em;
    }
    .cl-version-date { font-family: var(--mono); font-size: 11px; color: var(--muted-light); }
    .cl-version-tag {
      font-family: var(--mono); font-size: 9px; font-weight: 500;
      padding: 2px 8px; border-radius: 20px; border: 0.5px solid;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .cl-tag-initial { background: var(--bg); color: var(--muted); border-color: var(--border); }
    .cl-tag-minor { background: var(--teal-light); color: var(--teal-dark); border-color: rgba(0,169,167,0.3); }
    .cl-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .cl-entry {
      padding: 14px 20px; border-bottom: 0.5px solid var(--border);
      display: grid; grid-template-columns: 90px 1fr; gap: 12px; align-items: start;
    }
    .cl-entry:last-child { border-bottom: none; }
    .cl-entry-type {
      font-family: var(--mono); font-size: 9px; font-weight: 500;
      padding: 2px 7px; border-radius: 20px; border: 0.5px solid;
      text-transform: uppercase; letter-spacing: 0.05em;
      white-space: nowrap; display: inline-block; margin-top: 1px;
    }
    .cl-type-added { background: #f0faf4; color: var(--green); border-color: rgba(26,122,71,0.25); }
    .cl-type-changed { background: var(--teal-light); color: var(--teal-dark); border-color: rgba(0,169,167,0.3); }
    .cl-entry-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .cl-entry-desc { font-size: 12px; color: var(--muted); line-height: 1.65; }
  </style>
</head>
<body>

<header class="site-header">
  <h1><a href="../index.html"><div class="logo-dot"></div>ux-library</a></h1>
  <span class="version-badge">v2.0</span>
  <div class="header-spacer"></div>
</header>

    <div class="layout"><nav class="sidebar"></nav>
<main>
    <div class="breadcrumb">
      <a href="../index.html">Home</a>
      <span class="breadcrumb-sep">/</span>
      <a href="_index.html">Intra</a>
      <span class="breadcrumb-sep">/</span>
      <span>Changelog</span>
    </div>
    <div class="page-header">
      <h2><span class="icon"><i class="ti ti-home"></i></span> Intra — Changelog</h2>
      <p>Content history for Intra. Each entry records what was added or updated, and when.</p>
    </div>
    <div class="section-divider"></div>

    <!-- ── v0.1.0 ── -->
    <div class="cl-version-block">
      <div class="cl-version-header">
        <span class="cl-version-num">v0.1.0</span>
        <span class="cl-version-date">2026-04-27</span>
        <span class="cl-version-tag cl-tag-initial">Initial</span>
      </div>
      <div class="cl-card">
        <div class="cl-entry">
          <span class="cl-entry-type cl-type-added">Added</span>
          <div>
            <div class="cl-entry-title">Initial structure</div>
            <div class="cl-entry-desc">Company intranet platform. Placeholder files created — content pending.</div>
          </div>
        </div>
      </div>
    </div>

  </main></div>
<script src="../nav.js"></script>
</body>
</html>
